<script>
(function(){
  var PIXEL_ID="2096384047973111";
  var KEY="b2cs_consent_marketing";
  var T={de:{msg:"Wir verwenden Marketing-Cookies (Meta-Pixel), um die Relevanz unserer Werbung zu messen - nur mit Ihrer Zustimmung.",more:"Datenschutz",yes:"Akzeptieren",no:"Ablehnen",href:"/datenschutz"},

  function L(){var l=(document.documentElement.lang||"de").slice(0,2);return T[l]?l:"de";}
  function loadPixel(){
    if(window.fbq)return;
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version="2.0";n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,"script","https://connect.facebook.net/en_US/fbevents.js");

  function get(){try{return localStorage.getItem(KEY);}catch(e){return null;}}
  function setv(v){try{localStorage.setItem(KEY,v);}catch(e){}}
  function hide(){var b=document.getElementById("b2cs-consent");if(b&&b.parentNode)b.parentNode.removeChild(b);}
  function grant(){setv("granted");loadPixel();hide();}
  function deny(){setv("denied");hide();}

    var t=T[L()];
